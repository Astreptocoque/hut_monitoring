name: Hut Availability Checker

on:
  schedule:
    - cron: "27,57 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: auth

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # This automatically caches pip dependencies managed by pyproject.toml
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install .

      # Playwright browser caching is handled separately from pip
      - name: Get Playwright version
        id: playwright-version
        shell: bash
        run: |
          echo "version=$(pip show playwright | grep Version | sed 's/Version: //')" >> $GITHUB_OUTPUT
      
      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
      
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install --with-deps chromium
      
      - name: Install Playwright System Dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install --with-deps chromium

      - name: Run availability check
        env:
          HUT_EMAIL:           ${{ secrets.HUT_EMAIL }}
          HUT_PASSWORD:        ${{ secrets.HUT_PASSWORD }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          HEADLESS:            "true"
        run: python src/check_hut.py

      - name: Upload debug screenshot (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: debug_screenshot.png
          if-no-files-found: ignore
